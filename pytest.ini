[pytest]
testpaths = tests
pythonpath = src
addopts = -n 4 --dist=load -m "not opencode and not claude"
markers =
    codex: Codex-specific unit, integration, asset, or parity test
    pi: Pi-specific unit, integration, asset, or parity test
    opencode: unsupported OpenCode compatibility test (opt-in only)
    claude: unsupported Claude Code compatibility test (opt-in only)
    integration: multi-component runtime integration test (opt-in via `-m integration`)
    example: drives an examples/* fixture or generated asset (opt-in via `-m example`)
    st: system test that drives a real host code agent (slow, opt-in via `-m st`)
    st_opencode: ST case that runs through OpenCode
    st_codex: ST case that runs through Codex
    st_claude: ST case that runs through Claude Code
    st_pi_rpc: ST case that runs through Pi RPC
    st_pi: ST case that runs through Pi native/print Goal Plus
    st_npu: real NPU system test (expensive; requires explicit environment gate)
